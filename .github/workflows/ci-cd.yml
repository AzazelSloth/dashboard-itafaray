name: CI/CD

on:
  pull_request:
  push:
    branches:
      - '**'
  workflow_dispatch:
    inputs:
      target_environment:
        description: Environment cible pour le déploiement
        required: true
        type: choice
        options:
          - dev
          - pre-prod
          - prod
        default: dev

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}
  DOCKERHUB_IMAGE: ${{ secrets.DOCKERHUB_IMAGE }}
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

jobs:
  validate:
    name: Validate R app
    runs-on: ubuntu-latest
    env:
      R_LIBS_USER: /tmp/R/library

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2

      - name: Install validation dependencies
        run: |
          mkdir -p "$R_LIBS_USER"
          Rscript -e "install.packages(c('readxl', 'dplyr', 'stringr'), repos = 'https://cloud.r-project.org')"

      - name: Validate data preparation
        run: |
          Rscript -e "source('prepare_data.R'); d <- charger_donnees(); stopifnot(nrow(d) > 0); stopifnot(all(c('id_signal', 'secteur', 'signal') %in% names(d))); cat('Validation OK - rows:', nrow(d), '\n')"

  docker:
    name: Build and test Docker image
    runs-on: ubuntu-latest
    needs: validate
    outputs:
      target_environment: ${{ steps.resolve.outputs.target_environment }}
      image_tag: ${{ steps.resolve.outputs.image_tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve deployment target
        id: resolve
        shell: bash
        env:
          BRANCH_NAME: ${{ github.ref_name }}
          EVENT_NAME: ${{ github.event_name }}
          TARGET_INPUT: ${{ github.event.inputs.target_environment }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            TARGET_ENV="$TARGET_INPUT"
          elif [[ "$BRANCH_NAME" == *_prod ]]; then
            TARGET_ENV="prod"
          elif [[ "$BRANCH_NAME" == *_pprod ]]; then
            TARGET_ENV="pre-prod"
          else
            TARGET_ENV="dev"
          fi

          case "$TARGET_ENV" in
            dev)
              if [[ "$BRANCH_NAME" == *_prod || "$BRANCH_NAME" == *_pprod ]]; then
                echo "Branch '$BRANCH_NAME' cannot deploy to dev." >&2
                exit 1
              fi
              ;;
            pre-prod)
              if [[ "$BRANCH_NAME" != *_pprod ]]; then
                echo "Branch '$BRANCH_NAME' must end with '_pprod' to deploy to pre-prod." >&2
                exit 1
              fi
              ;;
            prod)
              if [[ "$BRANCH_NAME" != *_prod ]]; then
                echo "Branch '$BRANCH_NAME' must end with '_prod' to deploy to prod." >&2
                exit 1
              fi
              ;;
            *)
              echo "Unsupported target environment: $TARGET_ENV" >&2
              exit 1
              ;;
          esac

          echo "target_environment=$TARGET_ENV" >> "$GITHUB_OUTPUT"
          echo "image_tag=$TARGET_ENV" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request' && env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' && env.DOCKERHUB_IMAGE != ''
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Prepare image tags
        id: tags
        shell: bash
        env:
          IMAGE_TAG: ${{ steps.resolve.outputs.image_tag }}
          DOCKERHUB_IMAGE: ${{ secrets.DOCKERHUB_IMAGE }}
        run: |
          set -euo pipefail

          TAGS="${IMAGE_NAME}:sha-${GITHUB_SHA}"
          TAGS+=$'\n'"${IMAGE_NAME}:${IMAGE_TAG}"

          if [ -n "${DOCKERHUB_IMAGE:-}" ]; then
            TAGS+=$'\n'"${DOCKERHUB_IMAGE}:${IMAGE_TAG}"
          fi

          echo "tags<<EOF" >> "$GITHUB_OUTPUT"
          printf '%s\n' "$TAGS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Extract Docker metadata
        if: false
        run: echo "metadata-action replaced by explicit image tags"

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          tags: ${{ steps.tags.outputs.tags }}

      - name: Smoke test container
        shell: bash
        run: |
          set -euo pipefail
          IMAGE="${IMAGE_NAME}:sha-${GITHUB_SHA}"

          if [ "${GITHUB_EVENT_NAME}" != "pull_request" ]; then
            docker pull "$IMAGE"
          fi

          docker run -d --rm --name itafaray-smoke -p 3838:3838 "$IMAGE"

          for _ in $(seq 1 36); do
            if curl -fsS http://127.0.0.1:3838 >/dev/null; then
              echo "Shiny app is reachable"
              docker stop itafaray-smoke >/dev/null
              exit 0
            fi
            sleep 5
          done

          docker logs itafaray-smoke
          docker stop itafaray-smoke >/dev/null || true
          exit 1

  deploy:
    name: Deploy on EC2
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name != 'pull_request'
    environment: ${{ needs.docker.outputs.target_environment }}

    steps:
      - name: Check deployment configuration
        id: check
        shell: bash
        env:
          EC2_HOST: ${{ vars.EC2_HOST }}
          EC2_USER: ${{ vars.EC2_USER }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
          DOCKERHUB_IMAGE: ${{ secrets.DOCKERHUB_IMAGE }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          set -euo pipefail
          if [ -n "$EC2_HOST" ] && [ -n "$EC2_USER" ] && [ -n "$EC2_SSH_KEY" ] && [ -n "$DEPLOY_PATH" ] && [ -n "$DOCKERHUB_IMAGE" ] && [ -n "$DOCKERHUB_TOKEN" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure SSH
        if: steps.check.outputs.enabled == 'true'
        shell: bash
        env:
          EC2_HOST: ${{ vars.EC2_HOST }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$EC2_SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts

      - name: Deploy application image
        if: steps.check.outputs.enabled == 'true'
        shell: bash
        env:
          EC2_HOST: ${{ vars.EC2_HOST }}
          EC2_USER: ${{ vars.EC2_USER }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
          DOCKERHUB_IMAGE: ${{ secrets.DOCKERHUB_IMAGE }}
          IMAGE_TAG: ${{ needs.docker.outputs.image_tag }}
        run: |
          set -euo pipefail
          ssh "$EC2_USER@$EC2_HOST" \
            "cd '$DEPLOY_PATH' && APP_IMAGE='${DOCKERHUB_IMAGE}:${IMAGE_TAG}' docker compose pull app && APP_IMAGE='${DOCKERHUB_IMAGE}:${IMAGE_TAG}' docker compose up -d --no-build app"