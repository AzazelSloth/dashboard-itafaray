# =====================================================================
#  i-Tafaray — lancement local en un service
#  Démarrer :  docker compose up -d --build
#  Ouvrir   :  http://localhost:3838
#  Arrêter  :  docker compose down
# =====================================================================

services:
  app:
    build: .
    image: ${APP_IMAGE:-itafaray:latest}
    container_name: itafaray
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ports:
      - "3838:38
