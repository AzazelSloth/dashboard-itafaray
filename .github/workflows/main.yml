name: CI/CD

on:
  pull_request:
  push:
    branches:
      - '**'
  workflow_dispatch:
    inputs:
      target_environment:
        description: Target environment for deployment
        required: true
        type: choice
        options:
          - dev
          - pre-prod
        default: dev

permissions:
  contents: read
  packages: write

jobs:
  resolve:
    name: Resolve target environment
    runs-on: ubuntu-latest
    outputs:
      target_environment: ${{ steps.resolve.outputs.target_environment }}
      publish_image: ${{ steps.resolve.outputs.publish_image }}
      deploy_application: ${{ steps.resolve.outputs.deploy_application }}
    steps:
      - name: Resolve environment
        id: resolve
        shell: bash
        env:
          BRANCH_NAME: ${{ github.ref_name }}
          EVENT_NAME: ${{ github.event_name }}
          TARGET_INPUT: ${{ github.event.inputs.target_environment }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            TARGET_ENV="$TARGET_INPUT"
            if [ "$TARGET_ENV" = "dev" ]; then
              PUBLISH_IMAGE="true"
              DEPLOY_APPLICATION="true"
            else
              PUBLISH_IMAGE="true"
              DEPLOY_APPLICATION="true"
            fi
          elif [ "$BRANCH_NAME" = "main" ]; then
            TARGET_ENV="pre-prod"
            PUBLISH_IMAGE="true"
            DEPLOY_APPLICATION="true"
          elif [[ "$BRANCH_NAME" == *_pprod ]]; then
            TARGET_ENV="pre-prod"
            PUBLISH_IMAGE="true"
            DEPLOY_APPLICATION="true"
          else
            TARGET_ENV="dev"
            PUBLISH_IMAGE="true"
            DEPLOY_APPLICATION="true"
          fi

          echo "target_environment=$TARGET_ENV" >> "$GITHUB_OUTPUT"
          echo "publish_image=$PUBLISH_IMAGE" >> "$GITHUB_OUTPUT"
          echo "deploy_application=$DEPLOY_APPLICATION" >> "$GITHUB_OUTPUT"

  dev:
    needs: resolve
    if: needs.resolve.outputs.target_environment == 'dev'
    uses: ./.github/workflows/dev.yml
    with:
      target_environment: dev
      publish_image: ${{ needs.resolve.outputs.publish_image == 'true' }}
      deploy_application: ${{ needs.resolve.outputs.deploy_application == 'true' }}
    secrets: inherit

  pre-prod:
    needs: resolve
    if: needs.resolve.outputs.target_environment == 'pre-prod'
    uses: ./.github/workflows/pre-prod.yml
    with:
      target_environment: pre-prod
      publish_image: ${{ needs.resolve.outputs.publish_image == 'true' }}
      deploy_application: ${{ needs.resolve.outputs.deploy_application == 'true' }}
    secrets: inherit

  prod:
    needs: resolve
    if: needs.resolve.outputs.target_environment == 'prod'
    uses: ./.github/workflows/prod.yml
    with:
      target_environment: prod
      publish_image: ${{ needs.resolve.outputs.publish_image == 'true' }}
      deploy_application: ${{ needs.resolve.outputs.deploy_application == 'true' }}
    secrets: inherit
