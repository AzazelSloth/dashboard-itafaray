name: CI/CD reusable template

on:
  workflow_call:
    inputs:
      target_environment:
        required: true
        type: string

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}
  DOCKERHUB_IMAGE: ${{ secrets.DOCKERHUB_IMAGE }}
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

jobs:
  validate:
    name: Validate R app
    runs-on: ubuntu-latest
    env:
      R_LIBS_USER: /tmp/R/library

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2

      - name: Install validation dependencies
        run: |
          mkdir -p "$R_LIBS_USER"
          Rscript -e "install.packages(c('readxl', 'dplyr', 'stringr'), repos = 'https://cloud.r-project.org')"

      - name: Validate data preparation
        run: |
          Rscript -e "source('prepare_data.R'); d <- charger_donnees(); stopifnot(nrow(d) > 0); stopifnot(all(c('id_signal', 'secteur', 'signal') %in% names(d))); cat('Validation OK - rows:', nrow(d), '\n')"

  docker:
    name: Build and test Docker image
    runs-on: ubuntu-latest
    needs: validate
    outputs:
      target_environment: ${{ steps.meta.outputs.target_environment }}
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set deployment metadata
        id: meta
        shell: bash
        env:
          TARGET_ENV: ${{ inputs.target_environment }}
        run: |
          set -euo pipefail
          echo "target_environment=$TARGET_ENV" >> "$GITHUB_OUTPUT"
          echo "image_tag=$TARGET_ENV" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request' && env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' && env.DOCKERHUB_IMAGE != ''
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Prepare image tags
        id: tags
        shell: bash
        env:
          TARGET_ENV: ${{ inputs.target_environment }}
        run: |
          set -euo pipefail

          GHCR_IMAGE="$(printf '%s' "$IMAGE_NAME" | tr '[:upper:]' '[:lower:]')"
          SHA_IMAGE="${GHCR_IMAGE}:sha-${GITHUB_SHA}"

          TAGS="$SHA_IMAGE"
          TAGS+=$'\n'"${GHCR_IMAGE}:${TARGET_ENV}"

          if [ -n "${DOCKERHUB_IMAGE:-}" ]; then
            TAGS+=$'\n'"${DOCKERHUB_IMAGE}:${TARGET_ENV}"
          fi

          echo "tags<<EOF" >> "$GITHUB_OUTPUT"
          printf '%s\n' "$TAGS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "sha_image=$SHA_IMAGE" >> "$GITHUB_OUTPUT"

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          tags: ${{ steps.tags.outputs.tags }}

      - name: Smoke test container
        shell: bash
        env:
          SHA_IMAGE: ${{ steps.tags.outputs.sha_image }}
        run: |
          set -euo pipefail
          IMAGE="$SHA_IMAGE"

          if [ "${GITHUB_EVENT_NAME}" != "pull_request" ]; then
            docker pull "$IMAGE"
          fi

          docker run -d --rm --name itafaray-smoke -p 3838:3838 "$IMAGE"

          for _ in $(seq 1 36); do
            if curl -fsS http://127.0.0.1:3838 >/dev/null; then
              echo "Shiny app is reachable"
              docker stop itafaray-smoke >/dev/null
              exit 0
            fi
            sleep 5
          done

          docker logs itafaray-smoke
          docker stop itafaray-smoke >/dev/null || true
          exit 1

  deploy:
    name: Deploy on EC2
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name != 'pull_request'
    environment: ${{ needs.docker.outputs.target_environment }}

    steps:
      - name: Check deployment configuration
        id: check
        shell: bash
        env:
          EC2_HOST: ${{ vars.EC2_HOST }}
          EC2_USER: ${{ vars.EC2_USER }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
          DOCKERHUB_IMAGE: ${{ secrets.DOCKERHUB_IMAGE }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          set -euo pipefail
          if [ -n "$EC2_HOST" ] && [ -n "$EC2_USER" ] && [ -n "$EC2_SSH_KEY" ] && [ -n "$DEPLOY_PATH" ] && [ -n "$DOCKERHUB_IMAGE" ] && [ -n "$DOCKERHUB_TOKEN" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure SSH
        if: steps.check.outputs.enabled == 'true'
        shell: bash
        env:
          EC2_HOST: ${{ vars.EC2_HOST }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$EC2_SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts

      - name: Deploy application image
        if: steps.check.outputs.enabled == 'true'
        shell: bash
        env:
          EC2_HOST: ${{ vars.EC2_HOST }}
          EC2_USER: ${{ vars.EC2_USER }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
          DOCKERHUB_IMAGE: ${{ secrets.DOCKERHUB_IMAGE }}
          IMAGE_TAG: ${{ needs.docker.outputs.image_tag }}
        run: |
          set -euo pipefail
          ssh "$EC2_USER@$EC2_HOST" \
            "cd '$DEPLOY_PATH' && APP_IMAGE='${DOCKERHUB_IMAGE}:${IMAGE_TAG}' docker compose pull app && APP_IMAGE='${DOCKERHUB_IMAGE}:${IMAGE_TAG}' docker compose up -d --no-build app"