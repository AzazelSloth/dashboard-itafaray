name: CI/CD reusable template

on:
  workflow_call:
    inputs:
      target_environment:
        required: true
        type: string
      deploy_mode:
        required: false
        type: string
        default: docker-compose
      publish_image:
        required: false
        type: boolean
        default: false
      deploy_application:
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}
  DOCKERHUB_IMAGE: ${{ secrets.DOCKERHUB_IMAGE }}
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

jobs:
  validate:
    name: Validate R app
    runs-on: ubuntu-latest
    env:
      R_LIBS_USER: /tmp/R/library

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2

      - name: Install validation dependencies
        run: |
          mkdir -p "$R_LIBS_USER"
          Rscript -e "install.packages(c('readxl', 'dplyr', 'stringr'), repos = 'https://cloud.r-project.org')"

      - name: Validate data preparation
        run: |
          Rscript -e "source('prepare_data.R'); d <- charger_donnees(); stopifnot(nrow(d) > 0); stopifnot(all(c('id_signal', 'secteur', 'signal') %in% names(d))); cat('Validation OK - rows:', nrow(d), '\n')"

  docker:
    name: Build and test Docker image
    runs-on: ubuntu-latest
    needs: validate
    environment: ${{ inputs.target_environment }}
    outputs:
      target_environment: ${{ steps.meta.outputs.target_environment }}
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set deployment metadata
        id: meta
        shell: bash
        env:
          TARGET_ENV: ${{ inputs.target_environment }}
        run: |
          set -euo pipefail
          echo "target_environment=$TARGET_ENV" >> "$GITHUB_OUTPUT"
          echo "image_tag=$TARGET_ENV" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request' && inputs.publish_image
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request' && inputs.publish_image && env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' && env.DOCKERHUB_IMAGE != ''
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Prepare image tags
        id: tags
        shell: bash
        env:
          TARGET_ENV: ${{ inputs.target_environment }}
        run: |
          set -euo pipefail

          GHCR_IMAGE="$(printf '%s' "$IMAGE_NAME" | tr '[:upper:]' '[:lower:]')"
          SHA_IMAGE="${GHCR_IMAGE}:sha-${GITHUB_SHA}"

          TAGS="$SHA_IMAGE"
          TAGS+=$'\n'"${GHCR_IMAGE}:${TARGET_ENV}"

          if [ -n "${DOCKERHUB_IMAGE:-}" ]; then
            TAGS+=$'\n'"${DOCKERHUB_IMAGE}:${TARGET_ENV}"
          fi

          echo "tags<<EOF" >> "$GITHUB_OUTPUT"
          printf '%s\n' "$TAGS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "sha_image=$SHA_IMAGE" >> "$GITHUB_OUTPUT"

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' && inputs.publish_image }}
          load: ${{ github.event_name == 'pull_request' || !inputs.publish_image }}
          tags: ${{ steps.tags.outputs.tags }}

      - name: Smoke test container
        shell: bash
        env:
          SHA_IMAGE: ${{ steps.tags.outputs.sha_image }}
          PUBLISH_IMAGE: ${{ inputs.publish_image }}
        run: |
          set -euo pipefail
          IMAGE="$SHA_IMAGE"
          CONTAINER_NAME="itafaray-smoke"

          cleanup() {
            docker rm -f "$CONTAINER_NAME" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          if [ "${GITHUB_EVENT_NAME}" != "pull_request" ] && [ "$PUBLISH_IMAGE" = "true" ]; then
            docker pull "$IMAGE"
          fi

          docker run -d --name "$CONTAINER_NAME" -p 3838:3838 "$IMAGE"

          for _ in $(seq 1 36); do
            if curl -fsS http://127.0.0.1:3838 >/dev/null; then
              echo "Shiny app is reachable"
              exit 0
            fi

            if [ "$(docker inspect -f '{{.State.Running}}' "$CONTAINER_NAME")" != "true" ]; then
              break
            fi

            sleep 5
          done

          echo "Container state:"
          docker inspect -f 'status={{.State.Status}} exit={{.State.ExitCode}} oom={{.State.OOMKilled}} error={{json .State.Error}} started={{.State.StartedAt}} finished={{.State.FinishedAt}}' "$CONTAINER_NAME"
          echo "Container logs:"
          docker logs "$CONTAINER_NAME" || true
          exit 1

  deploy:
    name: Deploy on EC2
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name != 'pull_request' && inputs.deploy_application
    environment: ${{ needs.docker.outputs.target_environment }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check deployment configuration
        id: check
        shell: bash
        env:
          DEPLOY_MODE: ${{ inputs.deploy_mode }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ vars.EC2_USER }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
          DOMAIN: ${{ vars.DOMAIN }}
          EMAIL: ${{ vars.EMAIL }}
          DOCKERHUB_IMAGE: ${{ secrets.DOCKERHUB_IMAGE }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          EN_BASE_URL: ${{ vars.EN_BASE_URL }}
          EN_ENABLED: ${{ vars.EN_ENABLED }}
          EN_TEST_TARGET: ${{ vars.EN_TEST_TARGET }}
          EN_STATUS_WAIT_SEC: ${{ vars.EN_STATUS_WAIT_SEC }}
          EN_STATUS_POLL_SEC: ${{ vars.EN_STATUS_POLL_SEC }}
          EN_USER: ${{ secrets.EN_USER }}
          EN_PASS: ${{ secrets.EN_PASS }}
          EN_SERVICE_ID: ${{ secrets.EN_SERVICE_ID }}
          EN_AGENT_ID: ${{ secrets.EN_AGENT_ID }}
          EN_CATEGORY_ID: ${{ secrets.EN_CATEGORY_ID }}
          EN_CH_SMS: ${{ secrets.EN_CH_SMS }}
          EN_CH_WHATSAPP: ${{ secrets.EN_CH_WHATSAPP }}
          EN_CH_EMAIL: ${{ secrets.EN_CH_EMAIL }}
          OPENFN_INGEST_TOKEN: ${{ secrets.OPENFN_INGEST_TOKEN }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          set -euo pipefail
          missing=()

          [ -n "$EC2_HOST" ] || missing+=("EC2_HOST (secret)")
          [ -n "$EC2_USER" ] || missing+=("EC2_USER (environment variable)")
          [ -n "$DEPLOY_PATH" ] || missing+=("DEPLOY_PATH (environment variable)")
          [ -n "$EC2_SSH_KEY" ] || missing+=("EC2_SSH_KEY (secret)")

          if [ "$DEPLOY_MODE" = "docker-compose" ]; then
            [ -n "$DOCKERHUB_IMAGE" ] || missing+=("DOCKERHUB_IMAGE (secret)")
            [ -n "$DOCKERHUB_TOKEN" ] || missing+=("DOCKERHUB_TOKEN (secret)")
            [ -n "$DOMAIN" ] || missing+=("DOMAIN (environment variable)")
            [ -n "$EMAIL" ] || missing+=("EMAIL (environment variable)")
            [ -n "$EN_BASE_URL" ] || missing+=("EN_BASE_URL (environment variable)")
            [ -n "$EN_ENABLED" ] || missing+=("EN_ENABLED (environment variable)")
            [ -n "$EN_USER" ] || missing+=("EN_USER (secret)")
            [ -n "$EN_PASS" ] || missing+=("EN_PASS (secret)")
            [ -n "$EN_SERVICE_ID" ] || missing+=("EN_SERVICE_ID (secret)")
            [ -n "$EN_AGENT_ID" ] || missing+=("EN_AGENT_ID (secret)")
            [ -n "$EN_CATEGORY_ID" ] || missing+=("EN_CATEGORY_ID (secret)")
            [ -n "$EN_CH_SMS" ] || missing+=("EN_CH_SMS (secret)")
            [ -n "$EN_CH_WHATSAPP" ] || missing+=("EN_CH_WHATSAPP (secret)")
            [ -n "$EN_CH_EMAIL" ] || missing+=("EN_CH_EMAIL (secret)")
            [ -n "$OPENFN_INGEST_TOKEN" ] || missing+=("OPENFN_INGEST_TOKEN (secret)")
          fi

          if [ "${#missing[@]}" -eq 0 ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "missing_items=" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            {
              echo "missing_items<<EOF"
              printf '%s\n' "${missing[@]}"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Fail when deployment configuration is incomplete
        if: steps.check.outputs.enabled != 'true'
        shell: bash
        env:
          TARGET_ENV: ${{ needs.docker.outputs.target_environment }}
          MISSING_ITEMS: ${{ steps.check.outputs.missing_items }}
        run: |
          set -euo pipefail
          echo "Deployment configuration is incomplete for environment '$TARGET_ENV'."
          echo "Missing configuration:"
          printf '%s\n' "$MISSING_ITEMS"
          exit 1

      - name: Configure SSH
        if: steps.check.outputs.enabled == 'true'
        shell: bash
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$EC2_SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts

      - name: Upload Docker Compose file
        if: steps.check.outputs.enabled == 'true' && inputs.deploy_mode == 'docker-compose'
        shell: bash
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_USER: ${{ vars.EC2_USER }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
        run: |
          set -euo pipefail
          REMOTE_TMP="/tmp/dashboard-itafaray-docker-compose.yml"

          scp docker-compose.yml "$EC2_USER@$EC2_HOST:$REMOTE_TMP"
          ssh "$EC2_USER@$EC2_HOST" "
            set -euo pipefail
            if [ -w '$DEPLOY_PATH' ] || { [ ! -e '$DEPLOY_PATH' ] && [ -w \"\$(dirname '$DEPLOY_PATH')\" ]; }; then
              mkdir -p '$DEPLOY_PATH'
              install -m 644 '$REMOTE_TMP' '$DEPLOY_PATH/docker-compose.yml'
            elif sudo -n true 2>/dev/null; then
              sudo mkdir -p '$DEPLOY_PATH'
              sudo install -m 644 '$REMOTE_TMP' '$DEPLOY_PATH/docker-compose.yml'
            else
              echo 'Unable to write docker-compose.yml to the deployment path.'
              echo 'Grant write access to the deployment user or allow passwordless sudo for this path.'
              exit 1
            fi
            rm -f '$REMOTE_TMP'
          "

      - name: Sync deployment environment file
        if: steps.check.outputs.enabled == 'true' && inputs.deploy_mode == 'docker-compose'
        shell: bash
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ vars.EC2_USER }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
          DOCKERHUB_IMAGE: ${{ secrets.DOCKERHUB_IMAGE }}
          IMAGE_TAG: ${{ needs.docker.outputs.image_tag }}
          DOMAIN: ${{ vars.DOMAIN }}
          EMAIL: ${{ vars.EMAIL }}
          EN_BASE_URL: ${{ vars.EN_BASE_URL }}
          EN_ENABLED: ${{ vars.EN_ENABLED }}
          EN_TEST_TARGET: ${{ vars.EN_TEST_TARGET }}
          EN_STATUS_WAIT_SEC: ${{ vars.EN_STATUS_WAIT_SEC }}
          EN_STATUS_POLL_SEC: ${{ vars.EN_STATUS_POLL_SEC }}
          EN_USER: ${{ secrets.EN_USER }}
          EN_PASS: ${{ secrets.EN_PASS }}
          EN_SERVICE_ID: ${{ secrets.EN_SERVICE_ID }}
          EN_AGENT_ID: ${{ secrets.EN_AGENT_ID }}
          EN_CATEGORY_ID: ${{ secrets.EN_CATEGORY_ID }}
          EN_CH_SMS: ${{ secrets.EN_CH_SMS }}
          EN_CH_WHATSAPP: ${{ secrets.EN_CH_WHATSAPP }}
          EN_CH_EMAIL: ${{ secrets.EN_CH_EMAIL }}
          XROAD_BASE_URL: ${{ vars.XROAD_BASE_URL }}
          XROAD_CLIENT_HEADER: ${{ vars.XROAD_CLIENT_HEADER }}
          XROAD_SERVICE_PATH: ${{ vars.XROAD_SERVICE_PATH }}
          XROAD_ALLOW_INSECURE_TLS: ${{ vars.XROAD_ALLOW_INSECURE_TLS }}
          XROAD_CACHE_PATH: ${{ vars.XROAD_CACHE_PATH }}
          OPENFN_INGEST_TOKEN: ${{ secrets.OPENFN_INGEST_TOKEN }}
        run: |
          set -euo pipefail

          cat <<EOF > .deploy.env
          APP_IMAGE=${DOCKERHUB_IMAGE}:${IMAGE_TAG}
          DOMAIN=${DOMAIN}
          EMAIL=${EMAIL}
          EN_BASE_URL=${EN_BASE_URL}
          EN_ENABLED=${EN_ENABLED}
          EN_TEST_TARGET=${EN_TEST_TARGET}
          EN_STATUS_WAIT_SEC=${EN_STATUS_WAIT_SEC}
          EN_STATUS_POLL_SEC=${EN_STATUS_POLL_SEC}
          EN_USER=${EN_USER}
          EN_PASS=${EN_PASS}
          EN_SERVICE_ID=${EN_SERVICE_ID}
          EN_AGENT_ID=${EN_AGENT_ID}
          EN_CATEGORY_ID=${EN_CATEGORY_ID}
          EN_CH_SMS=${EN_CH_SMS}
          EN_CH_WHATSAPP=${EN_CH_WHATSAPP}
          EN_CH_EMAIL=${EN_CH_EMAIL}
          OPENFN_INGEST_TOKEN=${OPENFN_INGEST_TOKEN}
          EOF

          append_optional_env() {
            local name="$1"
            local value="${!name:-}"
            if [ -n "$value" ]; then
              printf '%s=%s\n' "$name" "$value" >> .deploy.env
            fi
          }

          append_optional_env XROAD_BASE_URL
          append_optional_env XROAD_CLIENT_HEADER
          append_optional_env XROAD_SERVICE_PATH
          append_optional_env XROAD_ALLOW_INSECURE_TLS
          append_optional_env XROAD_CACHE_PATH

          REMOTE_TMP="/tmp/dashboard-itafaray.env"

          scp .deploy.env "$EC2_USER@$EC2_HOST:$REMOTE_TMP"
          ssh "$EC2_USER@$EC2_HOST" "
            set -euo pipefail
            if [ -w '$DEPLOY_PATH' ] || { [ ! -e '$DEPLOY_PATH' ] && [ -w \"\$(dirname '$DEPLOY_PATH')\" ]; }; then
              mkdir -p '$DEPLOY_PATH'
              install -m 600 '$REMOTE_TMP' '$DEPLOY_PATH/.env'
            elif sudo -n true 2>/dev/null; then
              sudo mkdir -p '$DEPLOY_PATH'
              sudo install -m 600 '$REMOTE_TMP' '$DEPLOY_PATH/.env'
            else
              echo 'Unable to write .env to the deployment path.'
              echo 'Grant write access to the deployment user or allow passwordless sudo for this path.'
              exit 1
            fi
            rm -f '$REMOTE_TMP'
          "

          rm -f .deploy.env

      - name: Deploy application image
        if: steps.check.outputs.enabled == 'true' && inputs.deploy_mode == 'docker-compose'
        shell: bash
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ vars.EC2_USER }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
          DOCKERHUB_IMAGE: ${{ secrets.DOCKERHUB_IMAGE }}
          IMAGE_TAG: ${{ needs.docker.outputs.image_tag }}
        run: |
          set -euo pipefail
          ssh "$EC2_USER@$EC2_HOST" \
            "
              set -euo pipefail
              if docker info >/dev/null 2>&1; then
                USE_SUDO='false'
              elif sudo -n docker info >/dev/null 2>&1; then
                USE_SUDO='true'
              else
                echo 'Docker is not accessible for the deployment user.'
                echo 'Add the user to the docker group or allow passwordless sudo for docker.'
                exit 1
              fi

              cd '$DEPLOY_PATH'
              APP_IMAGE='${DOCKERHUB_IMAGE}:${IMAGE_TAG}'
              if [ \"\$USE_SUDO\" = 'true' ]; then
                DOCKER_CMD='sudo docker'
              else
                DOCKER_CMD='docker'
              fi

              if install -d -m 775 /var/lib/itafaray-dashboard/xroad 2>/dev/null; then
                :
              elif sudo -n install -d -m 775 /var/lib/itafaray-dashboard/xroad 2>/dev/null; then
                :
              else
                echo 'Unable to prepare the persistent X-Road cache directory.'
                echo 'Grant write access to /var/lib/itafaray-dashboard or allow passwordless sudo for install.'
                exit 1
              fi

              APP_IMAGE=\"\$APP_IMAGE\" \$DOCKER_CMD compose pull app ingest-api
              APP_IMAGE=\"\$APP_IMAGE\" \$DOCKER_CMD compose up -d --force-recreate --no-build app ingest-api
              EXPECTED_IMAGE_ID=\$(\$DOCKER_CMD image inspect --format '{{.Id}}' \"\$APP_IMAGE\")

              for SERVICE in app ingest-api; do
                CONTAINER_ID=\$(\$DOCKER_CMD compose ps -q \"\$SERVICE\")
                if [ -z \"\$CONTAINER_ID\" ]; then
                  echo \"Deployment completed but service \$SERVICE is not running.\"
                  exit 1
                fi

                RUNNING_IMAGE_ID=\$(\$DOCKER_CMD inspect --format '{{.Image}}' \"\$CONTAINER_ID\")
                if [ \"\$RUNNING_IMAGE_ID\" != \"\$EXPECTED_IMAGE_ID\" ]; then
                  echo \"Service \$SERVICE is not using the freshly pulled image.\"
                  echo \"Running image id: \$RUNNING_IMAGE_ID\"
                  echo \"Expected image id: \$EXPECTED_IMAGE_ID\"
                  exit 1
                fi
              done

              \$DOCKER_CMD compose ps app ingest-api
            "

      - name: Run X-Road ingestion after main deployment
        if: steps.check.outputs.enabled == 'true' && inputs.deploy_mode == 'docker-compose' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: bash
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ vars.EC2_USER }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
        run: |
          set -euo pipefail
          ssh "$EC2_USER@$EC2_HOST" \
            "
              set -euo pipefail
              if docker info >/dev/null 2>&1; then
                DOCKER_CMD='docker'
              elif sudo -n docker info >/dev/null 2>&1; then
                DOCKER_CMD='sudo docker'
              else
                echo 'Docker is not accessible for the deployment user.'
                echo 'Add the user to the docker group or allow passwordless sudo for docker.'
                exit 1
              fi

              cd '$DEPLOY_PATH'
              \$DOCKER_CMD compose exec -T app Rscript ingest_xroad.R
            "

      - name: Sync repository to deployment path
        if: steps.check.outputs.enabled == 'true' && inputs.deploy_mode == 'git-sync'
        shell: bash
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ vars.EC2_USER }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
          GIT_CLONE_TOKEN: ${{ secrets.GIT_CLONE_TOKEN }}
          REPOSITORY_URL: ${{ github.server_url }}/${{ github.repository }}.git
          GIT_REF: ${{ github.ref_name }}
          GIT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          if [ -n "${GIT_CLONE_TOKEN:-}" ] && [[ "$REPOSITORY_URL" == https://github.com/* ]]; then
            AUTH_REPOSITORY_URL="https://x-access-token:${GIT_CLONE_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          else
            AUTH_REPOSITORY_URL="$REPOSITORY_URL"
          fi

          ssh "$EC2_USER@$EC2_HOST" \
            "DEPLOY_PATH='$DEPLOY_PATH' REPOSITORY_URL='$AUTH_REPOSITORY_URL' GIT_REF='$GIT_REF' GIT_SHA='$GIT_SHA' bash -s" <<'EOF'
          set -euo pipefail

          ensure_path() {
            if [ -w "$DEPLOY_PATH" ] || { [ ! -e "$DEPLOY_PATH" ] && [ -w "$(dirname "$DEPLOY_PATH")" ]; }; then
              mkdir -p "$DEPLOY_PATH"
            elif sudo -n true 2>/dev/null; then
              sudo mkdir -p "$DEPLOY_PATH"
              sudo chown -R "$USER":"$USER" "$DEPLOY_PATH"
            else
              echo "Unable to prepare the deployment path for Git synchronization."
              echo "Grant write access to the deployment user or allow passwordless sudo for this path."
              exit 1
            fi
          }

          ensure_path

          if ! command -v git >/dev/null 2>&1; then
            echo "Git is required on the deployment host."
            exit 1
          fi

          if [ -d "$DEPLOY_PATH/.git" ]; then
            git -C "$DEPLOY_PATH" remote set-url origin "$REPOSITORY_URL"
            git -C "$DEPLOY_PATH" fetch --prune origin
            git -C "$DEPLOY_PATH" reset --hard
            git -C "$DEPLOY_PATH" clean -fd
          elif [ -n "$(find "$DEPLOY_PATH" -mindepth 1 -maxdepth 1 -print -quit 2>/dev/null)" ]; then
            echo "Deployment path exists and is not an initialized Git repository: $DEPLOY_PATH"
            exit 1
          else
            rmdir "$DEPLOY_PATH"
            git clone --branch "$GIT_REF" --single-branch "$REPOSITORY_URL" "$DEPLOY_PATH"
          fi

          git -C "$DEPLOY_PATH" fetch --prune origin
          git -C "$DEPLOY_PATH" checkout --force -B "$GIT_REF" "origin/$GIT_REF"
          git -C "$DEPLOY_PATH" reset --hard "$GIT_SHA"
          git -C "$DEPLOY_PATH" clean -fd
          git -C "$DEPLOY_PATH" rev-parse HEAD
          EOF
